name: Update Gallery List
on:
  push:
    paths-ignore:
      - 'index.html' 

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate File List
        run: |
          # 1. Get the files (ignoring subfolders and non-media files)
          FILES=$(ls -p | grep -v / | grep -vE '\.(html|yml|md|txt|ico)$' | jq -R . | jq -s . | tr -d '\n')
          
          # 2. Match the exact markers you put in your index.html
          # This deletes everything between START_FILES and END_FILES and adds the new list
          sed -i "/\/\/ START_FILES/,/\/\/ END_FILES/ { /\/\/ START_FILES/! { /\/\/ END_FILES/! d; } }" index.html
          sed -i "/\/\/ START_FILES/a const kepek = $FILES;" index.html

      - name: Commit and Push
        run: |
          git config --global user.name "Gallery Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update gallery file list" || exit 0
          git push
